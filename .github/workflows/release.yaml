name: Release VSCode Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.56)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码仓库
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. 全局安装 pnpm
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.8.1
          run_install: false

      # 3. 设置 Node.js 环境并缓存 pnpm 依赖
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. 安装项目依赖
      - name: Install Dependencies
        run: pnpm install

      # 5. 获取上一个 tag（用于生成 changelog）
      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      # 6. 打包 VSCode 扩展
      - name: Package VSCode Extension
        run: pnpm run vscode:package-latest

      # 7. 生成 Changelog
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "COMMIT"
          fromTag: ${{ steps.prev_tag.outputs.tag }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                    "title": "## ✨ Feature",
                    "labels": ["feat", "feature"]
                },
                {
                    "title": "## 🐛 Fix",
                    "labels": ["fix", "bug"]
                },
                {
                    "title": "## 🔧 Other",
                    "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": ".+ (build|chore|ci|init|docs|feat|fix|perf|refactor|revert|style|test){1}.+",
                  "on_property": "title",
                  "target": "$1",
                  "flags": "gu"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. 创建 GitHub Release
      - name: Create a GitHub release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: true

      # 9. 上传 .vsix 文件到 Release 作为资产
      - name: Upload VSIX to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ai-git-commiter-latest.vsix
          asset_name: ai-git-commiter-v${{ inputs.version }}.vsix
          asset_content_type: application/octet-stream
